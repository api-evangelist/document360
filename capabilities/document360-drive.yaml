naftiko: 1.0.0-alpha2
info:
  label: Document360 API — Drive
  description: 'Document360 API — Drive. 2 operations. Lead operation: List Drive Files. Self-contained Naftiko capability
    covering one Document360 business surface.'
  tags:
  - Document360
  - Drive
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUMENT360_API_KEY: DOCUMENT360_API_KEY
capability:
  consumes:
  - type: http
    namespace: document360-drive
    baseUri: https://apihub.document360.io/v2
    description: Document360 API — Drive business capability. Self-contained, no shared references.
    resources:
    - name: Drive-Files
      path: /Drive/Files
      operations:
      - name: listdrivefiles
        method: GET
        description: List Drive Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: Drive-Folders
      path: /Drive/Folders
      operations:
      - name: listdrivefolders
        method: GET
        description: List Drive Folders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_token
      value: '{{env.DOCUMENT360_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: document360-drive-rest
    port: 8080
    description: REST adapter for Document360 API — Drive. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/drive/files
      name: drive-files
      description: REST surface for Drive-Files.
      operations:
      - method: GET
        name: listdrivefiles
        description: List Drive Files
        call: document360-drive.listdrivefiles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/drive/folders
      name: drive-folders
      description: REST surface for Drive-Folders.
      operations:
      - method: GET
        name: listdrivefolders
        description: List Drive Folders
        call: document360-drive.listdrivefolders
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: document360-drive-mcp
    port: 9090
    transport: http
    description: MCP adapter for Document360 API — Drive. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-drive-files
      description: List Drive Files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: document360-drive.listdrivefiles
      outputParameters:
      - type: object
        mapping: $.
    - name: list-drive-folders
      description: List Drive Folders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: document360-drive.listdrivefolders
      outputParameters:
      - type: object
        mapping: $.
