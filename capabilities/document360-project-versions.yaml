naftiko: 1.0.0-alpha2
info:
  label: Document360 API — Project Versions
  description: 'Document360 API — Project Versions. 1 operations. Lead operation: List Project Versions. Self-contained Naftiko
    capability covering one Document360 business surface.'
  tags:
  - Document360
  - Project Versions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DOCUMENT360_API_KEY: DOCUMENT360_API_KEY
capability:
  consumes:
  - type: http
    namespace: document360-project-versions
    baseUri: https://apihub.document360.io/v2
    description: Document360 API — Project Versions business capability. Self-contained, no shared references.
    resources:
    - name: ProjectVersions
      path: /ProjectVersions
      operations:
      - name: listprojectversions
        method: GET
        description: List Project Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: api_token
      value: '{{env.DOCUMENT360_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: document360-project-versions-rest
    port: 8080
    description: REST adapter for Document360 API — Project Versions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projectversions
      name: projectversions
      description: REST surface for ProjectVersions.
      operations:
      - method: GET
        name: listprojectversions
        description: List Project Versions
        call: document360-project-versions.listprojectversions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: document360-project-versions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Document360 API — Project Versions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-project-versions
      description: List Project Versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: document360-project-versions.listprojectversions
      outputParameters:
      - type: object
        mapping: $.
