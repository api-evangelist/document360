      - method: DELETE
        name: deletecategory
        description: Delete Category
        call: document360.deletecategory
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /Drive/Folders
      name: listdrivefolders
      operations:
      - method: GET
        name: listdrivefolders
        description: List Drive Folders
        call: document360.listdrivefolders
        outputParameters:
        - type: object
          mapping: $.
    - path: /Drive/Files
      name: listdrivefiles
      operations:
      - method: GET
        name: listdrivefiles
        description: List Drive Files
        call: document360.listdrivefiles
        outputParameters:
        - type: object
          mapping: $.
    - path: /Users
      name: listusers
      operations:
      - method: GET
        name: listusers
        description: List Users
        call: document360.listusers
        outputParameters:
        - type: object
          mapping: $.
    - path: /Teams
      name: listteams
      operations:
      - method: GET
        name: listteams
        description: List Teams
        call: document360.listteams
        outputParameters:
        - type: object
          mapping: $.
