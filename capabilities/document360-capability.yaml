naftiko: 1.0.0-alpha2
info:
  label: Document360 API
  description: The Document360 API provides programmatic access to manage knowledge base projects, articles, categories, drives,
    files, users, and teams. It enables integrating Document360 documentation workflows into CI/CD pipelines and external
    applications.
  tags:
  - Document360
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: document360
    baseUri: https://apihub.document360.io/v2
    description: Document360 API HTTP API.
    authentication:
      type: apikey
      in: header
      name: api_token
      value: '{{DOCUMENT360_TOKEN}}'
    resources:
    - name: projectversions
      path: /ProjectVersions
      operations:
      - name: listprojectversions
        method: GET
        description: List Project Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: articles
      path: /Articles
      operations:
      - name: listarticles
        method: GET
        description: List Articles
        inputParameters:
        - name: projectVersionId
          in: query
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createarticle
        method: POST
        description: Create Article
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: articles-id
      path: /Articles/{id}
      operations:
      - name: getarticle
        method: GET
        description: Get Article
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatearticle
        method: PUT
        description: Update Article
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletearticle
        method: DELETE
        description: Delete Article
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: categories
      path: /Categories
      operations:
      - name: listcategories
        method: GET
        description: List Categories
        inputParameters:
        - name: projectVersionId
          in: query
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcategory
        method: POST
        description: Create Category
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: categories-id
      path: /Categories/{id}
      operations:
      - name: getcategory
        method: GET
        description: Get Category
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecategory
        method: PUT
        description: Update Category
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletecategory
        method: DELETE
        description: Delete Category
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: drive-folders
      path: /Drive/Folders
      operations:
      - name: listdrivefolders
        method: GET
        description: List Drive Folders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: drive-files
      path: /Drive/Files
      operations:
      - name: listdrivefiles
        method: GET
        description: List Drive Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /Users
      operations:
      - name: listusers
        method: GET
        description: List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: teams
      path: /Teams
      operations:
      - name: listteams
        method: GET
        description: List Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
