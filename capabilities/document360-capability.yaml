        call: document360.createarticle
        outputParameters:
        - type: object
          mapping: $.
    - path: /Articles/{id}
      name: getarticle
      operations:
      - method: GET
        name: getarticle
        description: Get Article
        call: document360.getarticle
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /Articles/{id}
      name: updatearticle
