openapi: 3.1.0
info:
  title: Document360 Articles Project Versions API
  description: The Document360 API provides programmatic access to manage knowledge base projects, articles, categories, drives, files, users, and teams. It enables integrating Document360 documentation workflows into CI/CD pipelines and external applications.
  version: 2.0.0
  contact:
    name: Document360
    url: https://document360.com/
servers:
- url: https://apihub.document360.io/v2
  description: Document360 API Hub
security:
- apiToken: []
tags:
- name: Project Versions
paths:
  /ProjectVersions:
    get:
      operationId: listProjectVersions
      summary: List Project Versions
      description: Retrieves the list of project versions in a Document360 knowledge base.
      tags:
      - Project Versions
      responses:
        '200':
          description: A list of project versions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectVersion'
components:
  schemas:
    ProjectVersion:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        versionNumber:
          type: string
        languageCode:
          type: string
  securitySchemes:
    apiToken:
      type: apiKey
      in: header
      name: api_token
