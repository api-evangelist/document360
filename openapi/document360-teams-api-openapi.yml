openapi: 3.1.0
info:
  title: Document360 Articles Teams API
  description: The Document360 API provides programmatic access to manage knowledge base projects, articles, categories, drives, files, users, and teams. It enables integrating Document360 documentation workflows into CI/CD pipelines and external applications.
  version: 2.0.0
  contact:
    name: Document360
    url: https://document360.com/
servers:
- url: https://apihub.document360.io/v2
  description: Document360 API Hub
security:
- apiToken: []
tags:
- name: Teams
paths:
  /Teams:
    get:
      operationId: listTeams
      summary: List Teams
      description: Retrieves teams in the knowledge base.
      tags:
      - Teams
      responses:
        '200':
          description: A list of teams.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'
components:
  schemas:
    Team:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        memberCount:
          type: integer
  securitySchemes:
    apiToken:
      type: apiKey
      in: header
      name: api_token
