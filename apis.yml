apis:
  - aid: document360:document360-api
    name: Document360 API
    description: >-
      The Document360 API provides programmatic access to manage knowledge base
      projects, articles, categories, drives, files, users, and teams. It
      enables integrating Document360 documentation workflows into CI/CD
      pipelines and external applications.
    humanURL: https://apidocs.document360.com/
    baseURL: https://apihub.document360.io/v2
    tags:
